[tools]
helm = "3.21.3"

[tasks."validate:all"]
description = "Run all Argo app wiring and render validations"
run = '''
mise run validate:cert-manager
mise run validate:cert-manager-config
mise run validate:gateway-api-crds
mise run validate:gateway-api-config
mise run validate:k8s-playground-service
mise run validate:istio-base
mise run validate:istiod
mise run validate:istio-cni
mise run validate:istio-ingressgateway
'''

[tasks."validate:cert-manager"]
description = "Validate cert-manager Application wiring and wrapper chart render"
usage = '''
flag "--platform-config <platform-config>" help="local platform-config repo path" default="../k8s-playground-platform-config"
'''
run = '''
app="clusters/kind/apps/cert-manager.yaml"
repo_url="https://github.com/mblayman/k8s-playground-platform-config.git"
target_revision="main"
source_path="platform/cert-manager"
release_name="cert-manager"
application="$(<"$app")"

case "$application" in
  *"repoURL: $repo_url"*) ;;
  *) echo "$app does not point at $repo_url" >&2; exit 1 ;;
esac

case "$application" in
  *"targetRevision: $target_revision"*) ;;
  *) echo "$app does not use targetRevision $target_revision" >&2; exit 1 ;;
esac

case "$application" in
  *"path: $source_path"*) ;;
  *) echo "$app does not point at $source_path" >&2; exit 1 ;;
esac

case "$application" in
  *"releaseName: $release_name"*) ;;
  *) echo "$app does not use releaseName $release_name" >&2; exit 1 ;;
esac

helm dependency update "{{ usage.platform_config }}/$source_path" >/dev/null
helm template "$release_name" "{{ usage.platform_config }}/$source_path" \
  --namespace cert-manager \
  --include-crds \
  >/dev/null
'''

[tasks."validate:cert-manager-config"]
description = "Validate cert-manager-config Application wiring and external source render"
usage = '''
flag "--platform-config <platform-config>" help="local platform-config repo path" default="../k8s-playground-platform-config"
'''
run = '''
app="clusters/kind/apps/cert-manager-config.yaml"
repo_url="https://github.com/mblayman/k8s-playground-platform-config.git"
target_revision="main"
source_path="platform/cert-manager-config"
application="$(<"$app")"

case "$application" in
  *"repoURL: $repo_url"*) ;;
  *) echo "$app does not point at $repo_url" >&2; exit 1 ;;
esac

case "$application" in
  *"targetRevision: $target_revision"*) ;;
  *) echo "$app does not use targetRevision $target_revision" >&2; exit 1 ;;
esac

case "$application" in
  *"path: $source_path"*) ;;
  *) echo "$app does not point at $source_path" >&2; exit 1 ;;
esac

kubectl kustomize "{{ usage.platform_config }}/$source_path" >/dev/null
'''

[tasks."validate:gateway-api-crds"]
description = "Render the Gateway API standard CRDs"
run = 'kubectl kustomize "https://github.com/kubernetes-sigs/gateway-api/config/crd?ref=v1.6.0" >/dev/null'

